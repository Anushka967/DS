<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Users</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h2>Registered Users</h2>
        <table border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Password</th>
                </tr>
            </thead>
            <tbody id="userList"></tbody>
        </table>

        <!-- Back to Registration Page Button -->
        <button onclick="goBack()">Back to Registration</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let users = JSON.parse(localStorage.getItem("users")) || [];
            let userList = document.getElementById("userList");

            if (users.length === 0) {
                userList.innerHTML = "<tr><td colspan='3'>No users found</td></tr>";
            } else {
                users.forEach(user => {
                    let row = `<tr><td>${user.name}</td><td>${user.email}</td><td>${user.password}</td></tr>`;
                    userList.innerHTML += row;
                });
            }
        });

        function goBack() {
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
